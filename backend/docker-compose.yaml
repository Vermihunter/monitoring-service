version: "3.8"

services:
  mongodb:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    env_file:
      - ./.env
      - ./db/.env
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # bullmq:
  #   build: .
  #   container_name: bullmq-app
  #   depends_on:
  #     - redis
  #   env_file:
  #     - ./.env
  #     - ./broker/.env
  #   volumes:
  #     - .:/app
  #   command: npm run dev

  shared:
    image: monitorapp-shared
    build:
      context: .
      dockerfile: services/shared/Dockerfile
    profiles: ["build"]

  badge-service:
    build:
      context: .
      dockerfile: services/badge-service/Dockerfile

  monitor-service:
    build:
      context: .
      dockerfile: ./services/monitor-service/Dockerfile

  gateway:
    build: ./gateway
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf
    # depends_on:
    #   - user-service
    #   - order-service
volumes:
  mongo_data:
  redis_data:
