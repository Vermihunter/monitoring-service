# =========================
# MAIN (global) CONTEXT
# =========================

# How many OS processes nginx uses to handle requests.
# "auto" picks number of CPU cores.
worker_processes auto;

# Where nginx writes its PID (useful for container/process management).
pid /var/run/nginx.pid;


# =========================
# EVENTS CONTEXT
# =========================
events {
    # Maximum connections per worker process.
    # Total max connections ≈ worker_processes * worker_connections
    worker_connections 1024;
}


# =========================
# HTTP CONTEXT
# =========================
http {
    # ---- Basic HTTP tuning ----

    # Hide nginx version in error pages and response headers.
    # Reduces fingerprinting.
    server_tokens off;

    # Include MIME types (so nginx knows content types when serving files).
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Log format (useful for debugging routing + performance).
    # $upstream_addr shows which container replica served the request.
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time '
                    'ua="$upstream_addr"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Sendfile improves static file serving performance.
    sendfile on;

    # Reduce latency for small responses.
    tcp_nopush on;
    tcp_nodelay on;

    # Keepalive improves performance by reusing connections.
    keepalive_timeout 65;


    # ---- Docker DNS / dynamic upstream resolution ----
    # Docker’s embedded DNS server inside containers:
    # This matters when you scale services: user-service resolves to multiple IPs.
    resolver 127.0.0.11 valid=10s ipv6=off;


    # =========================
    # SECURITY / HARDENING
    # =========================

    # Limit maximum upload size to avoid abuse (adjust per your use case).
    client_max_body_size 10m;

    # Protect against slowloris-like attacks by setting timeouts.
    client_header_timeout 10s;
    client_body_timeout   10s;
    send_timeout          10s;

    # If you terminate HTTPS at nginx (recommended in production),
    # enable HSTS only on the HTTPS server block, not on plain HTTP.


    # =========================
    # RATE LIMITING / DOS CONTROL
    # =========================

    # Limit requests per IP.
    # zone=... allocates shared memory for tracking client state.
    # rate=300r/m = 300 requests per minute per IP (example).
    limit_req_zone $binary_remote_addr zone=req_per_ip:10m rate=300r/m;

    # Limit concurrent connections per IP (helps against connection floods).
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;


    # =========================
    # COMPRESSION
    # =========================

    # Compress responses to save bandwidth and improve speed.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;

    # Common types to compress (APIs benefit heavily from JSON compression).
    gzip_types
        application/json
        application/ld+json
        application/xml
        text/plain
        text/css
        text/javascript
        application/javascript;


    # =========================
    # CORS (API Gateway approach)
    # =========================
    # Best practice: whitelist your frontend origins, not "*".
    #
    # This map creates a variable $cors_origin that is either empty (not allowed)
    # or the requesting Origin (allowed).
    #
    # Replace the example domains with your real ones.
    map $http_origin $cors_origin {
        default "";
        "~^https?://localhost(:\d+)?$" $http_origin;
        "~^https?://(www\.)?example\.com$" $http_origin;
    }


    # =========================
    # UPSTREAMS (MICROSERVICES)
    # =========================
    # With Docker scaling, each service name resolves to multiple container IPs.
    # Nginx will round-robin between those IPs.
    #
    # Note: When Nginx starts, it resolves hostnames. The "resolver" above helps
    # it re-resolve periodically in dynamic environments.
   
   
    upstream user_service {
        # Keep-alive connections to upstream reduce overhead.
        keepalive 32;
        server user-service:3000;
    }

    upstream auth_service {
        # Keep-alive connections to upstream reduce overhead.
        keepalive 32;
        server auth-service:3000;
    }

    upstream project_service {
        keepalive 32;
        server project-service:3000;
    }

    upstream monitor_service {
        keepalive 32;
        server monitor-service:3000;
    }

    upstream monitoring_service {
        keepalive 32;
        server monitoring-service:3000;
    }

    upstream badge_service {
        keepalive 32;
        server badge-service:3000;
    }


    # =========================
    # SERVER (HTTP) - API GATEWAY
    # =========================
    server {
        listen 80;

        # If you have a real domain, set server_name.
        # server_name api.example.com;

        # -------------------------
        # SECURITY HEADERS (Edge)
        # -------------------------
        # "always" ensures headers are added even on error responses.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Modern browsers mostly rely on CSP, but this is harmless.
        add_header X-XSS-Protection "1; mode=block" always;

        # Permissions Policy restricts powerful browser features.
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Content Security Policy (CSP):
        # For pure JSON APIs, CSP is not super relevant (it mainly protects browsers),
        # but it’s useful if you also serve HTML or a UI.
        #
        # If your gateway only serves APIs, you can omit CSP or keep a safe baseline.
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;


        # -------------------------
        # GLOBAL LIMITS (Edge)
        # -------------------------
        # Concurrent connections per IP (example: 20).
        limit_conn conn_per_ip 20;

        # Apply request rate limit.
        # burst allows short spikes; nodelay rejects extra immediately.
        limit_req zone=req_per_ip burst=50 nodelay;


        # -------------------------
        # CORS PRE-FLIGHT HANDLING
        # -------------------------
        # Many browsers send OPTIONS before non-simple requests (Authorization header, etc.).
        
        # if ($request_method = OPTIONS) {
        #     # If origin is allowed, echo it back; otherwise empty means "not allowed".
        #     add_header Access-Control-Allow-Origin $cors_origin always;
        #     add_header Access-Control-Allow-Credentials "true" always;
        #     add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        #     add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, User-Agent, DNT, Cache-Control, X-Requested-With" always;
        #     add_header Access-Control-Max-Age 86400 always; # cache preflight 1 day
        #     return 204;
        # }
        
        # For normal requests, also set CORS headers.
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;


        # -------------------------
        # Common proxy headers
        # -------------------------
        # These ensure your Node services can see real client info.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (safe even if you don't use WS).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Improve upstream performance:
        proxy_http_version 1.1;

        # Timeouts when talking to upstream services:
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # If upstream fails, try other upstream endpoints (good with replicas):
        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;


        # -------------------------
        # Routing to microservices
        # -------------------------

        # Exact block match
        location = /api/v1/users {
            proxy_pass http://user_service/;
        }

        location /api/v1/users/ {
            proxy_pass http://user_service/;
        }

        # Exact block match
        location = /api/v1/projects {
            proxy_pass http://project_service/;
        }

        location /api/v1/projects/ {
            proxy_pass http://project_service/;
        }

        # Exact block match
        location = /api/v1/monitors {
            proxy_pass http://monitor_service/;
        }

        location /api/v1/monitors/ {
            proxy_pass http://monitor_service/;
        }

        # Exact block match
        location = /api/v1/monitoring {
            proxy_pass http://monitoring_service/;
        }

        location /api/v1/monitoring/ {
            proxy_pass http://monitoring_service/;
        }

        # Exact block match
        location = /api/v1/badges {
            proxy_pass http://badge_service/;
        }

        location /api/v1/badges/ {
            proxy_pass http://badge_service/;
        }

        # Exact block match
        location = /api/v1/auth {
            proxy_pass http://auth_service/;
        }

        location /api/v1/auth/ {
            proxy_pass http://auth_service/;
        }

        # Health endpoint for load balancers / monitoring
        location = /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Default: reject unknown routes (helps avoid leaking things)
        location / {
            return 404;
        }
    }


    # =========================
    # Helper: map for WebSocket header correctness
    # =========================
    # Needs to be inside http {}.
    # This ensures Connection header is correct for WS vs non-WS.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
}
